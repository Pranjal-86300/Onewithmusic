<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KeyJam Pro</title>
<script src="https://unpkg.com/tone"></script>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: sans-serif;
}

/* ===== MAIN LAYOUT ===== */
.main {
  display: flex;
  gap: 40px;
  padding: 20px;
  align-items: flex-start;
}

/* LEFT PANEL */
.left {
  width: 300px;
}

/* RIGHT PANEL */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== SET BLOCK ===== */
.set-block {
  margin-bottom: 20px;
  padding: 10px;
  border: 1px solid #333;
  border-radius: 10px;
}

.set-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

button {
  background: #00ffcc;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
}

/* ===== KEYS ===== */
.key {
  width: 60px;
  height: 90px;
  background: #222;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
  transition: 0.1s;
}

.key.active {
  background: #00ffcc;
  color: black;
  transform: scale(1.1);
}

/* ===== PIANO ===== */
.piano {
  position: relative;
  width: fit-content;
  margin-top: 20px;
}

/* WHITE KEYS */
.white-row {
  display: flex;
  gap: 8px;
}

/* BLACK KEYS */
.black-row {
  position: absolute;
  top: -25px;
  left: 46px;
  display: flex;
  gap: 52px;
}

/* BLACK KEY STYLE */
.key.black {
  width: 40px;
  height: 60px;
  background: black;
  z-index: 2;
}

/* GAP BETWEEN D# and F# */
.gap {
  width: 60px;
}

/* ===== OCTAVE BAR ===== */
#octaveBar {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.oct {
  padding: 6px 10px;
  background: #222;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.oct.active {
  background: #00ffcc;
  color: black;
}

/* ===== ROW ===== */
.row {
  display: flex;
  gap: 10px;
}
/* PAD styling */
h3 {
  margin-bottom: 5px;
}

/* REMOVE SCROLL ISSUE */
body {
  overflow-x: hidden;
}
</style>
</head>

<body>

<div class="main">

<!-- LEFT -->
<div class="left">
  <h2>🎛 Performance Sets</h2>

  <div class="set-block">
    <div class="set-header">
      <span id="setName0">Acoustic Kit</span>
      <button onclick="openSetMenu(0)">Change</button>
    </div>
    <div class="row">
      <div class="key" data-key="q">Q</div>
      <div class="key" data-key="w">W</div>
      <div class="key" data-key="e">E</div>
      <div class="key" data-key="r">R</div>
    </div>
  </div>

  <div class="set-block">
    <div class="set-header">
      <span id="setName1">Kit Accents</span>
      <button onclick="openSetMenu(1)">Change</button>
    </div>
    <div class="row">
      <div class="key" data-key="a">A</div>
      <div class="key" data-key="s">S</div>
      <div class="key" data-key="d">D</div>
      <div class="key" data-key="f">F</div>
    </div>
  </div>

  <div class="set-block">
    <div class="set-header">
      <span id="setName2">Cymbals & Hats</span>
      <button onclick="openSetMenu(2)">Change</button>
    </div>
    <div class="row">
      <div class="key" data-key="z">Z</div>
      <div class="key" data-key="x">X</div>
      <div class="key" data-key="c">C</div>
      <div class="key" data-key="v">V</div>
    </div>
  </div>

</div>

<!-- RIGHT -->
<div class="right">
  <h2>🎹 Melody</h2>

  <div id="octaveBar">
    <div class="oct" data-oct="1">C1</div>
    <div class="oct" data-oct="2">C2</div>
    <div class="oct" data-oct="3">C3</div>
    <div class="oct active" data-oct="4">C4</div>
    <div class="oct" data-oct="5">C5</div>
    <div class="oct" data-oct="6">C6</div>
    <div class="oct" data-oct="7">C7</div>
  </div>

  <div class="piano">

    <div class="black-row">
      <div class="key black" data-key="y">Y<br>C#</div>
      <div class="key black" data-key="u">U<br>D#</div>
      <div class="gap"></div>
      <div class="key black" data-key="i">I<br>F#</div>
      <div class="key black" data-key="o">O<br>G#</div>
      <div class="key black" data-key="p">P<br>A#</div>
    </div>

    <div class="white-row">
      <div class="key" data-key="g">G<br>C</div>
      <div class="key" data-key="h">H<br>D</div>
      <div class="key" data-key="j">J<br>E</div>
      <div class="key" data-key="k">K<br>F</div>
      <div class="key" data-key="l">L<br>G</div>
      <div class="key" data-key=";">;<br>A</div>
      <div class="key" data-key="'">'<br>B</div>
      <div class="key" data-key="[">[<br>C</div>
      <div class="key" data-key="]">]<br>D</div>
      <div class="key" data-key="\\">\ <br>E</div>
    </div>

  </div>
  <!-- 🌌 PAD SECTION -->
<h3 style="margin-top:20px;">🌌 Pads</h3>

<div class="row">
  <div class="key" data-key="b">B<br>Major</div>
  <div class="key" data-key="n">N<br>Minor</div>
  <div class="key" data-key="m">M<br>Dream</div>
  <div class="key" data-key=",">,<br>Low</div>
  <div class="key" data-key=".">.<br>High</div>
  <div class="key" data-key="/">/<br>Stop</div>
</div>
</div>

</div>
<script>

const setNames = [
  "Acoustic Kit",
  "Kit Accents",
  "Cymbals & Hats",
  "Electronic / EDM",
  "Bass & 808",
  "Tabla",
  "Dholak & Dhol",
  "World Percussion",
  "FX & Glitch"
];
window.openSetMenu = function(rowIndex){

  let menu = "Select Kit:\n\n";

  setNames.forEach((name,i)=>{
    menu += `${i} - ${name}\n`;
  });

  const choice = prompt(menu);
  if(choice === null) return;

  const num = parseInt(choice);
  if(isNaN(num) || num < 0 || num >= sets.length) return;

  activeSets[rowIndex] = num;
  document.getElementById("setName"+rowIndex).innerText = setNames[num];
};
// =======================
// AUDIO START (FIXED)
// =======================
let started = false;
document.addEventListener("keydown", async () => {
  if (!started) {
    await Tone.start();
    started = true;
    console.log("Audio started");
  }
});

// =======================
// MASTER CHAIN (PRO MIX)
// =======================
const masterLimiter = new Tone.Limiter(-6);   // more headroom
const masterGain = new Tone.Gain(0.7);        // lower overall volume

const masterEQ = new Tone.EQ3({
  low: -3,
  mid: -1,
  high: -10   // smoother highs (important)
});

const compressor = new Tone.Compressor({
  threshold: -28,
  ratio: 3,
  attack: 0.02,
  release: 0.3
});

// ❌ REMOVE distortion completely
masterEQ.chain(compressor, masterGain, masterLimiter, Tone.Destination);
// =======================
// STATE
// =======================
let octave = 4;
let currentRoot = "C";
let activeSets = [0, 1, 2];

// =======================
// INSTRUMENTS (UPGRADED)
// =======================

// 🎹 Piano (softer)
const piano = new Tone.PolySynth(Tone.Synth, {
  oscillator: { type: "triangle" },
  envelope: {
    attack: 0.02,
    release: 0.3
  }
}).connect(masterEQ);

piano.volume.value = -8;


// 🎸 Bass (clean + warm)
// =======================
// 🥁 DRUM ENGINE (IMPROVED)
// =======================

// Kick variations
const kickAcoustic = new Tone.MembraneSynth({
  pitchDecay: 0.03,
  octaves: 5,
  oscillator: { type: "sine" },
  envelope: { attack: 0.01, decay: 0.4, sustain: 0 }
}).connect(masterEQ);

const kickPunch = new Tone.MembraneSynth({
  pitchDecay: 0.01,
  octaves: 8,
  envelope: { attack: 0.001, decay: 0.2 }
}).connect(masterEQ);

// Snare variations
const snareTight = new Tone.NoiseSynth({
  noise: { type: "white" },
  envelope: { attack: 0.003, decay: 0.15 }
}).connect(masterEQ);

function clap(){
  snareTight.triggerAttackRelease("16n");
  setTimeout(()=>snareTight.triggerAttackRelease("16n"),20);
}
function tablaNa(){
  tabla.triggerAttackRelease("C4","16n");
}

function tablaTin(){
  tabla.triggerAttackRelease("G4","8n");
}

function tablaDha(){
  tabla.triggerAttackRelease("C3","8n");
}

function tablaGe(){
  tabla.triggerAttackRelease("C2","8n");
}
// Hi-hats
const hatFilter = new Tone.Filter(6000, "lowpass");

const hatClosed = new Tone.MetalSynth({
  frequency: 180,
  harmonicity: 2.5,
  modulationIndex: 8,
  envelope: { attack: 0.002, decay: 0.05 }
}).connect(hatFilter).connect(masterEQ);

const hatOpen = new Tone.MetalSynth({
  frequency: 150,
  harmonicity: 2,
  modulationIndex: 6,
  envelope: { attack: 0.01, decay: 0.3 }
}).connect(hatFilter).connect(masterEQ);

// Toms
const tomLow = new Tone.MembraneSynth().connect(masterEQ);
const tomMid = new Tone.MembraneSynth().connect(masterEQ);
const tomHigh = new Tone.MembraneSynth().connect(masterEQ);

// Cymbals
const crash = new Tone.MetalSynth({ decay: 1 }).connect(masterEQ);
const ride = new Tone.MetalSynth({ decay: 0.5 }).connect(masterEQ);

// =======================
// 🌍 INDIAN / WORLD
// =======================

// Tabla (approximation)
const tabla = new Tone.MembraneSynth({
  pitchDecay: 0.008,
  octaves: 2
}).connect(masterEQ);

// Dholak (bass + slap)
const dholakBass = new Tone.MembraneSynth().connect(masterEQ);
const dholakSlap = new Tone.NoiseSynth({
  envelope:{attack:0.001, decay:0.1}
}).connect(masterEQ);

// Dhol
const dhol = new Tone.MembraneSynth({
  octaves: 6
}).connect(masterEQ);

// Conga/Bongo
const conga = new Tone.MembraneSynth().connect(masterEQ);

// Shaker
const shaker = new Tone.NoiseSynth({
  envelope:{attack:0.001, decay:0.05}
}).connect(masterEQ);

// =======================
// ⚡ EDM / ELECTRONIC
// =======================

// 808
const subBass = new Tone.Synth({
  oscillator:{type:"sine"},
  envelope:{attack:0.01, decay:0.3, sustain:0.5}
}).connect(masterEQ);

// Trap snare
const trapSnare = new Tone.NoiseSynth({
  envelope:{attack:0.001, decay:0.2}
}).connect(masterEQ);

// Hi-hat roll
function hatRoll(){
  for(let i=0;i<4;i++){
    hatClosed.triggerAttackRelease("32n", now()+i*0.02);
  }
}

// Glitch
const glitch = new Tone.NoiseSynth({
  envelope:{attack:0.001, decay:0.05}
}).connect(masterEQ);
// 🌌 PAD (background only)
const padFilter = new Tone.Filter(1200, "lowpass");
const padReverb = new Tone.Reverb({ decay: 6, wet: 0.4 });

const pad = new Tone.PolySynth(Tone.Synth, {
  oscillator: { type: "sawtooth" },
  envelope: {
    attack: 1,
    decay: 1,
    sustain: 0.8,
    release: 3
  }
});


// =======================
// HELPERS
// =======================
const now = () => Tone.now();

// humanization
function humanize() {
  return Math.random() * 0.015;
}

function playBass(note){
  bass.triggerAttackRelease(note,"8n", now()+humanize(), 0.8);
}

function playChord(root,type="major",oct=4){
  const map = {
    major:[0,4,7],
    minor:[0,3,7]
  };

  map[type].forEach(i=>{
    const n = Tone.Frequency(root+oct).transpose(i).toNote();
    piano.triggerAttackRelease(n,"8n", now()+humanize());
  });
}

function playPad(type){
  pad.releaseAll();
  const base = Tone.Frequency(currentRoot + "4");

  let intervals = [];

  if(type === "major") intervals = [0,4,7,12];
  if(type === "minor") intervals = [0,3,7,12];
  if(type === "dream") intervals = [0,4,7,14];
  if(type === "low") intervals = [-12,0,7];
  if(type === "high") intervals = [12,16,19];

  intervals.forEach(i=>{
    pad.triggerAttack(base.transpose(i).toNote());
  });
}

function stopPad(){
  pad.releaseAll();
}
// EXTRA HELPERS (NEW)

// soft clap
function playClap(){
  snare.triggerAttackRelease("16n", now(), 0.6);
}

// rimshot feel
function playRim(){
  piano.triggerAttackRelease(currentRoot+"5","32n");
}
const bass = new Tone.Synth({
  oscillator:{type:"sine"},
  envelope:{attack:0.02, decay:0.2, sustain:0.5, release:0.3}
}).connect(masterEQ);

bass.volume.value = -12;
// simple noise FX
const noise = new Tone.NoiseSynth({
  envelope:{ attack:0.01, decay:0.2 }
}).connect(masterEQ);

function riser(){
  noise.triggerAttackRelease("1n");
}

function downlifter(){
  noise.triggerAttackRelease("2n");
}

// simple lead
function playLead(){
  piano.triggerAttackRelease(currentRoot+octave,"16n", now()+humanize());
}
pad.chain(padFilter, padReverb, masterEQ);
pad.volume.value = -34;
hatClosed.volume.value = -18;
hatOpen.volume.value = -16;
snareTight.volume.value = -10;
trapSnare.volume.value = -12;
kickAcoustic.volume.value = -6;
kickPunch.volume.value = -8;
subBass.volume.value = -14;
glitch.volume.value = -18;
noise.volume.value = -20;
crash.volume.value = -14;
ride.volume.value = -16;
// =======================
// SETS (BALANCED)
// =======================
const sets = [

/* 0 — ACOUSTIC KIT (CORE DRUMMING) */
[
  ()=>kickAcoustic.triggerAttackRelease("C1","8n"),   // Acoustic Kick
  ()=>snareTight.triggerAttackRelease("16n"),         // Tight Snare
  ()=>hatClosed.triggerAttackRelease("16n"),          // Closed Hat
  ()=>hatOpen.triggerAttackRelease("8n")              // Open Hat
],

/* 1 — KIT ACCENTS (EXPRESSIVE DRUMMING) */
[
  ()=>kickPunch.triggerAttackRelease("C1","8n"),      // Punch Kick
  ()=>clap(),                                        // Clap
  ()=>snareTight.triggerAttackRelease("32n"),         // Ghost Snare
  ()=>playRim()                                      // Rimshot
],

/* 2 — CYMBALS & HATS */
[
  ()=>crash.triggerAttackRelease("8n"),               // Crash
  ()=>ride.triggerAttackRelease("8n"),                // Ride
  ()=>hatClosed.triggerAttackRelease("32n"),          // Fast Hat
  ()=>hatOpen.triggerAttackRelease("4n")              // Long Open Hat
],

/* 3 — ELECTRONIC / EDM */
[
  ()=>kickPunch.triggerAttackRelease("C1","8n"),      // EDM Kick
  ()=>trapSnare.triggerAttackRelease("16n"),          // Trap Snare
  ()=>hatRoll(),                                     // Hat Roll
  ()=>glitch.triggerAttackRelease("16n")              // Glitch FX
],

/* 4 — BASS & 808 */
[
  ()=>subBass.triggerAttackRelease(currentRoot+"1","8n"),  // Deep Sub
  ()=>subBass.triggerAttackRelease(currentRoot+"2","8n"),  // Mid Bass
  ()=>subBass.triggerAttackRelease(currentRoot+"3","8n"),  // High Bass
  ()=>subBass.triggerAttackRelease(currentRoot+"1","16n")  // Fast Hit
],

/* 5 — TABLA (REALISTIC STRUCTURE) */
[
  ()=>tabla.triggerAttackRelease("C4","16n"),   // Na (dry)
  ()=>tabla.triggerAttackRelease("G4","8n"),    // Tin (ring)
  ()=>tabla.triggerAttackRelease("C3","8n"),    // Dha (full)
  ()=>tabla.triggerAttackRelease("C2","8n")     // Ge (bass)
],

/* 6 — DHOLAK & DHOL */
[
  ()=>dholakBass.triggerAttackRelease("C2","8n"),   // Dholak Bass
  ()=>dholakSlap.triggerAttackRelease("16n"),       // Dholak Slap
  ()=>dhol.triggerAttackRelease("C2","8n"),         // Dhol Hit
  ()=>dhol.triggerAttackRelease("C3","4n")          // Strong Dhol
],

/* 7 — WORLD PERCUSSION */
[
  ()=>conga.triggerAttackRelease("C3","8n"),        // Conga Low
  ()=>conga.triggerAttackRelease("C4","8n"),        // Conga High
  ()=>shaker.triggerAttackRelease("32n"),           // Shaker Fast
  ()=>shaker.triggerAttackRelease("16n")            // Shaker Groove
],

/* 8 — FX & GLITCH */
[
  ()=>glitch.triggerAttackRelease("16n"),           // Glitch Hit
  ()=>riser(),                                     // Riser
  ()=>downlifter(),                                // Down FX
  ()=>noise.triggerAttackRelease("8n")              // Noise Burst
]

];
// =======================
// OCTAVE CONTROL (FIX)
// =======================

// set octave + update UI
function setOctave(oct){
  octave = oct;

  document.querySelectorAll(".oct").forEach(el=>{
    el.classList.remove("active");

    if(parseInt(el.dataset.oct) === oct){
      el.classList.add("active");
    }
  });
}

// click on UI buttons
document.querySelectorAll(".oct").forEach(el=>{
  el.addEventListener("click", ()=>{
    setOctave(parseInt(el.dataset.oct));
  });
});
// =======================
// NOTE MAPPING (WITH OCTAVE EXTENSION)
// =======================
function getNote(key){

  const whiteKeys = {
    g:"C", h:"D", j:"E",
    k:"F", l:"G", ";":"A", "'":"B",
    "[":"C", "]":"D", "\\":"E"
  };

  const blackKeys = {
    y:"C#", u:"D#", i:"F#", o:"G#", p:"A#"
  };

  let note = whiteKeys[key] || blackKeys[key];
  if(!note) return null;

  let oct = octave;

  // 👉 NEXT OCTAVE EXTENSION
  if(["[","]","\\"].includes(key)){
    oct = octave + 1;
  }

  return note + oct;
}
// =======================
// KEY HANDLER
// =======================
document.addEventListener("keydown",(e)=>{
  const key = e.key.toLowerCase();

  // 🎚 OCTAVE KEYS (1–7)
  if(["1","2","3","4","5","6","7"].includes(key)){
    setOctave(parseInt(key));
    return;
  }

  // 🎹 melody
  const note = getNote(key);

  if(note){
    currentRoot = note.slice(0,-1);
    piano.triggerAttackRelease(note,"8n");
    playBass(currentRoot+"2");
    return;
  }

  // 🌌 pads
  if(key === "b") return playPad("major");
  if(key === "n") return playPad("minor");
  if(key === "m") return playPad("dream");
  if(key === ",") return playPad("low");
  if(key === ".") return playPad("high");
  if(key === "/") return stopPad();

  // 🥁 drum rows
  const leftRows = [
    ["q","w","e","r"],
    ["a","s","d","f"],
    ["z","x","c","v"]
  ];

  leftRows.forEach((row,rowIndex)=>{
    const idx = row.indexOf(key);
    if(idx !== -1){
      sets[activeSets[rowIndex]][idx]();
    }
  });
});
</script>
</body>
</html>
